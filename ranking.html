<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking - BAZA SIADA</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <header class="app-bar">
            <div class="app-bar-brand">
                <h1>Ranking</h1>
            </div>
            <div class="app-bar-utilities">
                <div id="presence-counter" class="presence-counter hidden" aria-live="polite">
                    <span id="presence-label">Aktywni teraz</span>
                    <strong id="presence-count">--</strong>
                </div>
                <div class="app-bar-actions">
                    <a href="index.html" class="app-bar-icon" aria-label="Wróć do quizów" title="Wróć do quizów">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M19 12H5"></path>
                            <path d="M12 19l-7-7 7-7"></path>
                        </svg>
                    </a>
                </div>
            </div>
        </header>

        <main class="ranking-page">
            <section class="ranking-controls">
                <label for="rankingSelector">Wybierz ranking</label>
                <select id="rankingSelector">
                    <option value="overall">Ranking ogólny</option>
                </select>
            </section>

            <section id="ranking-panel" class="leaderboard-box">
                <div class="global-leaderboard-header">
                    <span id="ranking-kicker">Ranking</span>
                    <h2 id="ranking-title">Najlepsze wyniki ogółem</h2>
                </div>
                <div id="ranking-leaderboard">
                    <p class="leaderboard-empty">Ładowanie rankingu...</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/ranking.js"></script>
</body>
</html>
