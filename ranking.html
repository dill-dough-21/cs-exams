<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking - BAZA SIADA</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <header class="app-bar">
            <div class="app-bar-brand">
                <h1>Ranking</h1>
            </div>
            <div class="app-bar-utilities">
                <div id="presence-counter" class="presence-counter hidden" aria-live="polite">
                    <span id="presence-label">Aktywni teraz</span>
                    <strong id="presence-count">--</strong>
                </div>
                <div class="app-bar-actions">
                    <a href="https://github.com/dill-dough-21/cs-exams" class="app-bar-icon github-link" aria-label="Otwórz GitHub projektu" title="GitHub" target="_blank" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.52 2.87 8.36 6.84 9.72.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.38-3.37-1.38-.45-1.19-1.11-1.51-1.11-1.51-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.36-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.35 9.35 0 0 1 12 6.97c.85 0 1.7.12 2.5.35 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.48-.01 2.82 0 .27.18.59.69.49A10.13 10.13 0 0 0 22 12.26C22 6.58 17.52 2 12 2z"></path>
                        </svg>
                    </a>
                    <a href="index.html" class="app-bar-icon" aria-label="Wróć do quizów" title="Wróć do quizów">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M19 12H5"></path>
                            <path d="M12 19l-7-7 7-7"></path>
                        </svg>
                    </a>
                </div>
            </div>
        </header>

        <main class="ranking-page">
            <section class="ranking-controls">
                <label for="rankingSelector">Wybierz ranking</label>
                <select id="rankingSelector">
                    <option value="overall">Ranking ogólny</option>
                </select>
            </section>

            <section id="ranking-panel" class="leaderboard-box">
                <div class="global-leaderboard-header">
                    <span id="ranking-kicker">Ranking</span>
                    <h2 id="ranking-title">Najlepsze wyniki ogółem</h2>
                </div>
                <div id="ranking-leaderboard">
                    <p class="leaderboard-empty">Ładowanie rankingu...</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/ranking.js"></script>
</body>
</html>
